<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>BRUM · Report GA4 Giornaliero</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --viola:     #911ef7;
  --giallo:    #ffee1f;
  --ink:       #0d0d10;
  --ink3:      #5b5b66;
  --ink4:      #9a9aa8;
  --offwhite:  #faf9ff;
  --white:     #ffffff;
  --line:      #e7e5f1;
  --lineSoft:  #f1eff9;
  --success:   #1fb87a;
  --danger:    #ff3b3b;
  --header-bg: #f0eefb;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--offwhite);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 32px 16px;
}

.card {
  background: var(--white);
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(145,30,247,.08);
  overflow: hidden;
  width: 100%;
  max-width: 720px;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--line);
}

.header-left { display: flex; align-items: center; gap: 14px; }

.brum-badge {
  background: var(--viola);
  color: var(--giallo);
  font-weight: 800;
  font-size: 13px;
  letter-spacing: 1px;
  padding: 6px 12px;
  border-radius: 8px;
  text-transform: uppercase;
}

.header-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
}

.header-date {
  font-size: 13px;
  color: var(--ink4);
}

/* ── Table ── */
table {
  width: 100%;
  border-collapse: collapse;
}

thead tr {
  background: var(--header-bg);
}

thead th {
  font-size: 12px;
  font-weight: 700;
  color: var(--viola);
  text-align: right;
  padding: 10px 20px;
  letter-spacing: .3px;
}

thead th:first-child { text-align: left; }

tbody tr {
  border-bottom: 1px solid var(--lineSoft);
}

tbody tr:last-child { border-bottom: none; }

tbody td {
  padding: 14px 20px;
  font-size: 15px;
  text-align: right;
  color: var(--ink);
}

tbody td:first-child {
  text-align: left;
  font-weight: 700;
  font-size: 14px;
}

.delta {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  font-weight: 600;
  margin-left: 6px;
}

.delta.up   { color: var(--success); }
.delta.down { color: var(--danger); }
.delta.flat { color: var(--ink4); }

.avg-val { color: var(--ink3); font-size: 14px; }

/* ── Footer ── */
.footer {
  padding: 12px 24px 16px;
  border-top: 1px solid var(--lineSoft);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.footer-note {
  font-size: 11px;
  color: var(--ink4);
  line-height: 1.5;
}

.reload-btn {
  flex-shrink: 0;
  background: var(--viola);
  color: var(--white);
  border: none;
  border-radius: 8px;
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}

.reload-btn:hover { opacity: .85; }
.reload-btn:disabled { opacity: .5; cursor: default; }

.error-msg {
  padding: 32px 24px;
  text-align: center;
  color: var(--danger);
  font-size: 14px;
}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="header">
    <div class="header-left">
      <span class="brum-badge">BRUM</span>
      <span class="header-title">Report giornaliero GA4</span>
    </div>
    <span class="header-date" id="header-date">caricamento…</span>
  </div>
  <div id="body-slot"></div>
  <div class="footer">
    <span class="footer-note" id="footer-note">
      Fonte: GA4 property 423910028 · finestra: ultimi 28 giorni ·
      la freccia accanto a "yesterday" confronta il dato di ieri con la media a 7 giorni ·
      usa Ricarica per aggiornare
    </span>
    <button class="reload-btn" id="reload-btn" onclick="loadData()">Ricarica</button>
  </div>
</div>

<script>
const METRIC_LABELS = {
  page_view:         'page_view',
  session_start:     'session_start',
  user_engagement:   'user_engagement',
  initiate_checkout: 'initiate_checkout',
};

function fmt(n) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('it-IT', { maximumFractionDigits: 1 });
}

function delta(yesterday, avg7) {
  if (!avg7) return { pct: null, cls: 'flat', arrow: '·' };
  const pct = ((yesterday - avg7) / avg7) * 100;
  if (pct > 0)  return { pct, cls: 'up',   arrow: '▲' };
  if (pct < 0)  return { pct, cls: 'down', arrow: '▼' };
  return { pct: 0, cls: 'flat', arrow: '·' };
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-').map(Number);
  const months = ['gennaio','febbraio','marzo','aprile','maggio','giugno',
                  'luglio','agosto','settembre','ottobre','novembre','dicembre'];
  return `dato di ieri: ${d} ${months[m-1]} ${y}`;
}

function renderTable(data) {
  const rows = data.metrics.map(m => {
    const d = delta(m.yesterday, m.avg7);
    const pctStr = d.pct != null ? (d.pct > 0 ? '+' : '') + d.pct.toFixed(0) + '%' : '';
    return `
      <tr>
        <td>${METRIC_LABELS[m.name] || m.name}</td>
        <td>
          ${fmt(m.yesterday)}
          ${d.pct != null ? `<span class="delta ${d.cls}">${d.arrow} ${pctStr}</span>` : ''}
        </td>
        <td class="avg-val">${fmt(m.avg7)}</td>
        <td class="avg-val">${fmt(m.avg15)}</td>
        <td class="avg-val">${fmt(m.avg28)}</td>
      </tr>`;
  }).join('');

  return `
    <table>
      <thead>
        <tr>
          <th>ga4</th>
          <th>yesterday</th>
          <th>avg7gg</th>
          <th>avg15</th>
          <th>avg28</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function loadData() {
  const btn = document.getElementById('reload-btn');
  const slot = document.getElementById('body-slot');
  btn.disabled = true;
  btn.textContent = '…';

  try {
    const res = await fetch('./data.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    document.getElementById('header-date').textContent = formatDate(data.date);
    slot.innerHTML = renderTable(data);
  } catch (e) {
    slot.innerHTML = `<div class="error-msg">Errore nel caricamento dei dati: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Ricarica';
  }
}

loadData();
</script>
</body>
</html>
